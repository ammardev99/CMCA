// Top-level build file where you can add configuration options common to all sub-projects/modules.

allprojects {
    repositories {
        google()
        mavenCentral()
        // Add any additional repositories if needed
        jcenter() // Optional: Add if any dependencies use JCenter, though it's deprecated
    }
}

// Set the root project’s build directory
rootProject.buildDir = "../build"

// Ensure that each subproject’s build directory is relative to the root project’s build directory
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    
    // Apply evaluation order dependency for the app module
    project.evaluationDependsOn(":app")
    
    // Ensuring that subprojects use Java 1.8 if necessary
    tasks.withType(JavaCompile) {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }
}
    
// Register a custom clean task to delete the build directories
tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

